name: deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ---- detect which service changed (native per-job path filter, no 3rd-party action) ----
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.detect.outputs.client }}
      server: ${{ steps.detect.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so we can diff against the pre-push SHA

      - name: Detect changed paths
        id: detect
        run: |
          set -euo pipefail

          # Manual run or first push → build both (no reliable base to diff).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "client=true" >> "$GITHUB_OUTPUT"
            echo "server=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch → building both."; exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "client=true"  >> "$GITHUB_OUTPUT"
            echo "server=true"  >> "$GITHUB_OUTPUT"
            echo "First push on branch → building both."; exit 0
          fi

          CHANGED="$(git diff --name-only "$BEFORE" "${{ github.sha }}")"
          echo "Changed files:"; echo "$CHANGED"

          if echo "$CHANGED" | grep -q '^client/'; then C=true; else C=false; fi
          if echo "$CHANGED" | grep -q '^server/'; then S=true; else S=false; fi
          echo "client=$C" >> "$GITHUB_OUTPUT"
          echo "server=$S" >> "$GITHUB_OUTPUT"
          echo "→ client=$C  server=$S"

  # ---- client: vite build (VITE_API_URL baked) → nginx ----
  build-client:
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/mahmud035/quran-client # HARDCODED — never github.repository
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: ./client # monorepo: subdir context, NOT repo root
          push: true
          build-args: |
            VITE_API_URL=https://lab-quran-api.halalaura.co.uk/api
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          platforms: linux/amd64 # box + runners are amd64; no arm64
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client
      - name: Trigger Coolify deploy (client)
        run: |
          echo "Triggering Coolify deploy for quran-client…"
          response=$(curl --silent --show-error --write-out "\nHTTP_STATUS:%{http_code}" \
            --request GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK_CLIENT }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1 | cut -d: -f2)
          echo "Coolify response ($status): $body"
          # fail loud on non-2xx OR a false-200 rejection body
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify client deploy failed with HTTP $status"; exit 1
          fi
          if echo "$body" | grep -qiE 'not allowed|unauthorized|"error"'; then
            echo "::error::Coolify rejected the client deploy: $body"; exit 1
          fi
          echo "Client deploy triggered."

      - name: Notify Discord (client)
        if: success()
        run: |
          curl --silent --show-error \
            --request POST "${{ secrets.DISCORD_WEBHOOK }}" \
            --header "Content-Type: application/json" \
            --data "{\"content\": \"🚀 **quran-client** deployed → https://lab-quran.halalaura.co.uk (\`${GITHUB_SHA::7}\`)\"}"

  # ---- server: tsc → node ----
  build-server:
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/mahmud035/quran-server # HARDCODED
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          platforms: linux/amd64
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
      - name: Trigger Coolify deploy (server)
        run: |
          echo "Triggering Coolify deploy for quran-server…"
          response=$(curl --silent --show-error --write-out "\nHTTP_STATUS:%{http_code}" \
            --request GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK_SERVER }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1 | cut -d: -f2)
          echo "Coolify response ($status): $body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify server deploy failed with HTTP $status"; exit 1
          fi
          if echo "$body" | grep -qiE 'not allowed|unauthorized|"error"'; then
            echo "::error::Coolify rejected the server deploy: $body"; exit 1
          fi
          echo "Server deploy triggered."

      - name: Notify Discord (server)
        if: success()
        run: |
          curl --silent --show-error \
            --request POST "${{ secrets.DISCORD_WEBHOOK }}" \
            --header "Content-Type: application/json" \
            --data "{\"content\": \"🚀 **quran-server** deployed → https://lab-quran-api.halalaura.co.uk (\`${GITHUB_SHA::7}\`)\"}"
